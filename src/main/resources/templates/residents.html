<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Жильцы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Управление жильцами</h1>

    <!-- Форма добавления -->
    <div class="card mt-4">
        <div class="card-header">
            <h5>Добавить нового жильца</h5>
        </div>
        <div class="card-body">
            <form th:action="@{/residents/add}" th:object="${newResident}" method="post">
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">ФИО</label>
                            <input type="text" class="form-control" th:field="*{fullName}" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Адрес</label>
                            <input type="text" class="form-control" th:field="*{address}" required>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-success">Добавить</button>
            </form>
        </div>
    </div>

    <!-- Список жильцов -->
    <div class="card mt-4">
        <div class="card-header">
            <h5>Список жильцов</h5>
        </div>
        <div class="card-body">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>ФИО</th>
                    <th>Адрес</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="resident : ${residents}">
                    <td th:text="${resident.id}"></td>
                    <td th:text="${resident.fullName}"></td>
                    <td th:text="${resident.address}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <a href="/" class="btn btn-secondary mt-3">На главную</a>
</div>
</body>
</html>
