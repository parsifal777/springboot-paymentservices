<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Статистика работы со справочниками</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1 class="text-center">Статистика работы со справочниками</h1>

    <div class="card mt-4">
        <div class="card-header">
            <h5 class="card-title mb-0">Количество операций по справочникам</h5>
        </div>
        <div class="card-body">
            <table class="table table-striped" th:if="${statistics} and ${!statistics.empty}">
                <thead>
                <tr>
                    <th>Справочник</th>
                    <th>Добавлений</th>
                    <th>Изменений</th>
                    <th>Удалений</th>
                    <th>Всего операций</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="stat : ${statistics}">
                    <td th:text="${stat.key}">Справочник</td>
                    <td th:text="${stat.value.get('ADD') ?: 0}">0</td>
                    <td th:text="${stat.value.get('UPDATE') ?: 0}">0</td>
                    <td th:text="${stat.value.get('DELETE') ?: 0}">0</td>
                    <td th:text="${(stat.value.get('ADD') ?: 0) + (stat.value.get('UPDATE') ?: 0) + (stat.value.get('DELETE') ?: 0)}">0</td>
                </tr>
                </tbody>
            </table>

            <div th:if="${statistics == null or statistics.empty}" class="alert alert-info">
                Статистика отсутствует. Выполните операции с жильцами или счетами.
            </div>
        </div>
    </div>

    <div class="mt-3 text-center">
        <a href="/" class="btn btn-secondary">На главную</a>
    </div>
</div>
</body>
</html>
