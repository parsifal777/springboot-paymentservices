<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Коммунальные платежи</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1 class="text-center">Система учета коммунальных платежей</h1>

    <div class="row mt-5">
        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title">Жильцы</h5>
                    <p class="card-text">Всего: <span th:text="${residents.size()}">0</span></p>
                    <a href="/residents" class="btn btn-primary">Управление жильцами</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title">Счета</h5>
                    <p class="card-text">Всего: <span th:text="${invoices.size()}">0</span></p>
                    <a href="/invoices" class="btn btn-primary">Управление счетами</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title">Платежи</h5>
                    <p class="card-text">Всего: <span th:text="${payments.size()}">0</span></p>
                    <a href="/payments" class="btn btn-primary">Управление платежами</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
